name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            out: rosync-darwin-arm64
            src_bin: rosync
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            out: rosync-linux-x86_64
            src_bin: rosync
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            out: rosync-windows-x86_64.exe
            src_bin: rosync.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Check widget platform commands
        run: node scripts/check-platform-commands.mjs

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: daemon -> target

      - name: Test
        working-directory: daemon
        run: cargo test --release --target ${{ matrix.target }}

      - name: Build
        working-directory: daemon
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        working-directory: daemon
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.src_bin }}" "dist/${{ matrix.out }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: daemon/dist/${{ matrix.out }}

  release:
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
