<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ro Sync</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="root" class="app" data-view="projects">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <span id="daemon-dot" class="dot dot-idle" title="Daemon status"></span>
          <img class="brand-logo" src="assets/rosynclogo.png" alt="Ro Sync" />
        </div>
        <nav class="sidenav tabs" role="tablist">
          <button class="tab sidenav-item" role="tab" data-route="projects" aria-label="Projects">
            <svg class="sidenav-icon" viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" aria-hidden="true">
              <path d="M1.75 4.25a1 1 0 0 1 1-1h3.5l1.5 1.5h6.5a1 1 0 0 1 1 1v6.5a1 1 0 0 1-1 1H2.75a1 1 0 0 1-1-1v-7z"/>
            </svg>
            <span class="sidenav-label">Projects</span>
          </button>
          <button class="tab sidenav-item" role="tab" data-route="active" aria-label="Activity">
            <svg class="sidenav-icon" viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M1.5 8.5h3l1.5-4 3 8 1.5-4h4"/>
            </svg>
            <span class="sidenav-label">Activity</span>
          </button>
          <button class="tab sidenav-item" role="tab" data-route="conflicts" aria-label="Conflicts">
            <svg class="sidenav-icon" viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" aria-hidden="true">
              <path d="M8 1.75 1.5 13.25h13L8 1.75z"/>
              <path d="M8 6.5v3M8 11v.6" stroke-linecap="round"/>
            </svg>
            <span class="sidenav-label">Conflicts</span>
            <span id="conflicts-badge" class="badge sidenav-badge" hidden>0</span>
          </button>
          <button class="tab sidenav-item" role="tab" data-route="docs" aria-label="Docs">
            <svg class="sidenav-icon" viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4.25 2.25h5.5l2 2v9.5h-7.5a1 1 0 0 1-1-1V3.25a1 1 0 0 1 1-1z"/>
              <path d="M9.75 2.25v2h2"/>
              <path d="M5.75 7.25h4.5M5.75 9.5h4.5M5.75 11.75h2.5"/>
            </svg>
            <span class="sidenav-label">Docs</span>
          </button>
          <button class="tab sidenav-item" role="tab" data-route="settings" aria-label="Settings">
            <svg class="sidenav-icon" viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="8" cy="8" r="2.2"/>
              <path d="M8 1.25v1.8M8 12.95v1.8M14.75 8h-1.8M3.05 8h-1.8M12.78 3.22l-1.27 1.27M4.49 11.51l-1.27 1.27M12.78 12.78l-1.27-1.27M4.49 4.49 3.22 3.22"/>
            </svg>
            <span class="sidenav-label">Settings</span>
          </button>
        </nav>
        <div class="sidebar-foot">
          <div class="helpcard">
            <span class="helpcard-icon" aria-hidden="true">
              <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="8" cy="8" r="6.25"/>
                <path d="M6.25 6.25c.3-1 1-1.5 1.85-1.5 1 0 1.9.7 1.9 1.7 0 1-.95 1.3-1.5 1.7-.42.3-.5.7-.5 1.05"/>
                <path d="M8 11.4v.4" stroke-linecap="round"/>
              </svg>
            </span>
            <div class="helpcard-text">
              <strong class="helpcard-title">Need help?</strong>
              <p class="helpcard-body">Open Docs or an issue on GitHub.</p>
            </div>
          </div>
        </div>
      </aside>
      <main id="view" class="view" aria-live="polite"></main>
      <footer class="statusbar">
        <span id="status-left" class="status-left">—</span>
        <span id="status-right" class="status-right">—</span>
      </footer>
    </div>

    <script type="module" src="bridge.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
